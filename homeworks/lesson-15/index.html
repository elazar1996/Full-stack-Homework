<!DOCTYPE html>
<html lang="he">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Fireworks Canvas - With Bonus</title>
    <style>
        /* איפוס שוליים כדי לתפוס את כל המסך */
        body, html {
            margin: 0;
            padding: 0;
            width: 100%;
            height: 100%;
            background-color: #111; /* רקע כהה */
        }

        /* הגדרות הקנבס - חובה position: relative */
        #canvas {
            width: 100vw;
            height: 100vh;
            position: relative;
            overflow: hidden; /* מונע פסי גלילה */
            cursor: crosshair; /* סמן עכבר מתאים לאווירה */
        }

        /* עיצוב חלקיקי הפיצוץ (Event 1) */
        .particle {
            position: absolute;
            width: 8px;
            height: 8px;
            border-radius: 50%;
            /* אנימציה חלקה לתנועה ולשקיפות */
            transition: transform 0.6s ease-out, opacity 0.6s ease-out;
            pointer-events: none; /* מונע הפרעה לאירועי עכבר */
        }

        /* עיצוב שובל הניצוצות (Event 2) */
        .spark {
            position: absolute;
            width: 5px;
            height: 5px;
            background-color: gold; /* ניצוץ בצבע זהב */
            border-radius: 50%;
            /* אנימציה לשקיפות בלבד */
            transition: opacity 0.6s ease-out;
            pointer-events: none;
        }
    </style>
</head>
<body>

    <div id="canvas"></div>

    <script>
        const canvas = document.getElementById("canvas");
        
        // משתנה לשמירת מהירות העכבר (עבור בונוס חלק 2)
        let lastSpeed = 0;

        // אירוע 1 — לחיצה יוצרת פיצוץ (כולל הבונוסים)
        canvas.addEventListener("click", function(e) {
            for (let i = 0; i < 20; i++) {
                const dot = document.createElement("div");
                dot.classList.add("particle");
                
                // מיקום התחלתי בנקודת הלחיצה
                dot.style.left = e.offsetX + "px";
                dot.style.top  = e.offsetY + "px";
                
                // בונוס 1: צבע אקראי לכל חלקיק בפיצוץ
                dot.style.backgroundColor = `hsl(${Math.random() * 360}, 100%, 60%)`;
                
                canvas.appendChild(dot);

                const angle = Math.random() * 2 * Math.PI;
                
                // בונוס 2: חישוב המרחק בשילוב מהירות העכבר השמורה.
                // הכפלת המהירות ב-3 כדי להעצים את האפקט הוויזואלי של הפיצוץ.
                const distance = 40 + Math.random() * 80 + (lastSpeed * 3);
                
                const dx = Math.cos(angle) * distance;
                const dy = Math.sin(angle) * distance;

                // הפעלת האנימציה (תזוזה + דהייה) אחרי שהאלמנט ב-DOM
                setTimeout(() => {
                    dot.style.transform = `translate(${dx}px, ${dy}px)`;
                    dot.style.opacity = "0";
                }, 10);

                // ניקוי האלמנט מה-DOM לאחר סיום האנימציה
                setTimeout(() => dot.remove(), 700);
            }
        });

        // אירוע 2 — תזוזת עכבר יוצרת שובל ניצוצות (וחישוב מהירות)
        canvas.addEventListener("mousemove", function(e) {
            // בונוס 2 (הכנה): שמירת מהירות העכבר
            // משתמשים בערך מוחלט (Math.abs) כדי להתייחס בחיוב גם לתנועה שמאלה או למעלה
            lastSpeed = Math.abs(e.movementX) + Math.abs(e.movementY);

            // יצירת ניצוץ בודד לשובל
            const spark = document.createElement("div");
            spark.classList.add("spark");
            spark.style.left = e.offsetX + "px";
            spark.style.top  = e.offsetY + "px";
            canvas.appendChild(spark);

            // אנימציית דהייה מופעלת אחרי השהייה קלה
            setTimeout(() => { spark.style.opacity = "0" }, 50);
            // מחיקת הניצוץ בסיום
            setTimeout(() => spark.remove(), 650);
        });

        // אירוע 3 — לחיצה על Escape מנקה את המסך
        document.addEventListener("keydown", function(e) {
            if (e.key === "Escape") {
                canvas.innerHTML = "";
            }
        });
    </script>

</body>
</html>
