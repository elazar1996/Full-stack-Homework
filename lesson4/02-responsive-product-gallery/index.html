<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Document</title>
    <link rel="stylesheet" href="style.css">
</head>
<body>
    <div class="product-gallery">

    <div class="product-card">
        <img src="https://via.placeholder.com/250x150/003366/ffffff?text=Investment+Plan" alt="Investment">
        <h3>תוכנית השקעות</h3>
        <p>בניית תיק מותאם אישית</p>
        <span class="price">₪500</span>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/250x150/C5A059/ffffff?text=Real+Estate" alt="Real Estate">
        <h3>ייעוץ משכנתאות</h3>
        <p>תכנון פיננסי לקניית דירה</p>
        <span class="price">₪750</span>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/250x150/003366/ffffff?text=Retirement" alt="Retirement">
        <h3>תכנון פרישה</h3>
        <p>ניהול קרנות פנסיה והשתלמות</p>
        <span class="price">₪1,200</span>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/250x150/C5A059/ffffff?text=Tax+Optimization" alt="Tax">
        <h3>אופטימיזציית מס</h3>
        <p>החזרי מס ותכנון חכם</p>
        <span class="price">₪450</span>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/250x150/003366/ffffff?text=Business+Growth" alt="Business">
        <h3>ליווי עסקי</h3>
        <p>ייעוץ פיננסי לעסקים קטנים</p>
        <span class="price">₪2,000</span>
    </div>

    <div class="product-card">
        <img src="https://via.placeholder.com/250x150/C5A059/ffffff?text=Family+Budget" alt="Budget">
        <h3>כלכלת המשפחה</h3>
        <p>ניהול תקציב ויציאה מחובות</p>
        <span class="price">₪300</span>
    </div>

</div>
</body>
</html>
